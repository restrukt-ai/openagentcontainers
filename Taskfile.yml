version: "3"

dotenv: ["spec-site/.env"]

includes:
  cli:
    taskfile: ./cli/Taskfile.yml
    dir: ./cli
  pkg:
    taskfile: ./pkg/Taskfile.yml
    dir: ./pkg
  spec: ./spec-site/Taskfile.yml

tasks:
  docs:
    desc: Serve Go package docs locally via pkgsite
    cmds:
      - pkgsite .

  lint:
    desc: Run all lints across cli and pkg
    deps:
      - cli:lint
      - pkg:lint

  test:
    desc: Run all tests across cli and pkg
    deps:
      - cli:test
      - pkg:test

  tidy:
    desc: Tidy go.mod and go.sum across cli and pkg
    deps:
      - cli:tidy
      - pkg:tidy
