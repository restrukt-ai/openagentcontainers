version: "3"

tasks:
  install:
    desc: Create venv and install dependencies
    cmds:
      - python3 -m venv .venv
      - .venv/bin/pip install -q -r requirements.txt
    generates:
      - .venv/bin/mkdocs

  serve:
    desc: Serve the docs locally with live reload
    deps: [install]
    cmds:
      - .venv/bin/mkdocs serve --watch .

  build:
    desc: Build the static site to site/
    deps: [install]
    cmds:
      - .venv/bin/mkdocs build
    generates:
      - site/
